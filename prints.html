<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prints — Fraser Moore Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #F4EFE6;
      --parchment:  #EAE2D5;
      --tan:        #C4B49A;
      --bark:       #8B7355;
      --earth:      #5C4A32;
      --soil:       #2E2117;
      --white:      #FDFAF6;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      color: var(--soil);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 15px;
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    /* ── Navigation ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
      background: rgba(244, 239, 230, 0.95);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--parchment);
    }

    .nav-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--soil);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--earth);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--soil); }

    /* ── Page Header ── */
    .page-header {
      padding: 140px 48px 72px;
      max-width: 1200px;
      margin: 0 auto;
      border-bottom: 1px solid var(--parchment);
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--bark);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-label::after {
      content: '';
      display: block;
      height: 1px;
      width: 48px;
      background: var(--tan);
    }

    .page-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(32px, 4vw, 52px);
      line-height: 1.15;
      color: var(--soil);
      margin-bottom: 20px;
    }

    .page-header p {
      font-size: 14.5px;
      color: var(--earth);
      max-width: 560px;
    }

    .page-header a {
      color: var(--bark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .page-header a:hover { color: var(--soil); }

    /* ── Store embed ── */
    .store-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 64px 48px 100px;
    }

    .faa-embed {
      width: 100%;
      min-height: 900px;
      border: none;
      display: block;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--parchment);
      padding: 40px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--tan);
      letter-spacing: 0.1em;
    }

    footer a {
      color: var(--tan);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--bark); }

    .footer-socials { display: flex; gap: 20px; }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      nav { padding: 22px 24px; }
      .page-header { padding: 120px 24px 56px; }
      .store-wrap { padding: 48px 24px 72px; }
      footer { flex-direction: column; gap: 16px; text-align: center; }
    }

    @media (max-width: 520px) {
      .nav-links { gap: 20px; }
      .faa-embed { min-height: 700px; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="nav-name">Fraser Moore</a>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#catalog">Catalog</a></li>
      <li><a href="prints.html" class="active">Prints</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- Page Header -->
  <header class="page-header">
    <div class="section-label">Shop</div>
    <h1>Fine Art Prints</h1>
    <p>
      All prints are fulfilled by
      <a href="https://fineartamerica.com/profiles/fraser-moore" target="_blank" rel="noopener">Fine Art America</a>
      on museum-quality paper with archival inks. Choose your size, framing, and finish at checkout.
    </p>
  </header>

  <!-- FAA Store embed -->
  <div class="store-wrap">
    <iframe
      class="faa-embed"
      src="https://fineartamerica.com/profiles/fraser-moore/shop/embed"
      title="Fraser Moore — Fine Art America Store"
      loading="lazy"
      allowfullscreen>
    </iframe>
  </div>

  <!-- Footer -->
  <footer>
    <span>&copy; 2026 Fraser Moore Photography</span>
    <div class="footer-socials">
      <a href="https://www.instagram.com/fraserj_m/" target="_blank" rel="noopener">Instagram</a>
    </div>
  </footer>

</body>
</html>
